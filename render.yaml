services:
  - type: web
    name: shl-assessment-advisor
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false          # Fill in via Render dashboard — never commit to git
      - key: PYTHON_VERSION
        value: 3.11.0
